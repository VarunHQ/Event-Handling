<!DOCTYPE html>
<html lang="en">

<head>
    <title>My Hobbies</title>
    <style>
        body {
            background: #ffd6f5;
            color: #2b1c5d;
            font-family: 'Comic Sans MS', 'Comic Sans', cursive;
            margin: 40px;
        }

        h1 {
            color: #6a1b9a;
        }

        p {
            font-size: 1.2rem;
            line-height: 1.6;
        }

        button {
            background: #6a1b9a;
            color: #ffd6f5;
            border: none;
            padding: 10px 18px;
            border-radius: 12px;
            cursor: pointer;
            font-size: 1rem;
            margin-top: 20px;
        }

        button:hover {
            background: #4f0f6d;
        }
    </style>
</head>

<body>
    <h1>My Hobbies</h1>
    <p>My hobbies are coding, singing, drawing, and playing games.</p>
    <button onclick="changeTheme()">Change the Theme!</button>

    <script>
        function changeTheme() {
            document.body.style.background = '#2d3176';
            document.body.style.color = '#f6d860';
            document.querySelector('h1').style.color = '#ffda77';
            document.querySelector('button').style.background = '#f76f8e';
            document.querySelector('button').style.color = '#2d3176';
        }
    </script>
</body>

</html>
